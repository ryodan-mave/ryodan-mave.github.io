<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLE AR Hologram Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    #ui {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 255, 255, 0.15); backdrop-filter: blur(10px);
      padding: 15px 30px; border-radius: 50px; border: 1px solid rgba(0, 255, 255, 0.4);
      color: white; text-align: center; z-index: 100; pointer-events: none;
    }
    #startButton {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      padding: 16px 40px; font-size: 1.4rem; background: #00ffff;
      color: black; border: none; border-radius: 50px; font-weight: bold;
      cursor: pointer; box-shadow: 0 0 30px #00ffff;
      z-index: 100;
    }
    #status {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      color: #00ffcc; font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div id="ui">
    <h2>BLE AR Hologram Demo</h2>
    <p>Tap on a surface to place interactive hologram</p>
  </div>
  <button id="startButton">Start AR Experience</button>
  <div id="status"></div>

  <script>
    let session = null;
    let hitTestSource = null;
    let renderer, scene, camera;
    let reticle, placedObjects = [];

    const statusEl = document.getElementById('status');

    async function startAR() {
      if (!navigator.xr) {
        alert("WebXR is not supported on this device/browser.");
        return;
      }

      try {
        const supported = await navigator.xr.isSessionSupported('immersive-ar');
        if (!supported) {
          alert("Immersive AR is not supported on this device.");
          return;
        }

        const sessionInit = {
          requiredFeatures: ['hit-test'],
          optionalFeatures: ['dom-overlay', 'local-floor']
        };

        session = await navigator.xr.requestSession('immersive-ar', sessionInit);

        // Setup Three.js
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl2', { xrCompatible: true });
        renderer = new THREE.WebGLRenderer({ context: gl, antialias: true });
        renderer.xr.enabled = true;
        renderer.xr.setSession(session);

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera();

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // Reticle (visual guide for placement)
        reticle = new THREE.Mesh(
          new THREE.RingGeometry(0.15, 0.2, 32),
          new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide })
        );
        reticle.rotation.x = -Math.PI / 2;
        reticle.visible = false;
        scene.add(reticle);

        document.getElementById('startButton').style.display = 'none';

        session.addEventListener('end', () => {
          statusEl.textContent = "AR Session Ended";
        });

        // Hit Test
        const referenceSpace = await session.requestReferenceSpace('viewer');
        hitTestSource = await session.requestHitTestSource({ space: referenceSpace });

        renderer.setAnimationLoop(animate);

      } catch (error) {
        console.error(error);
        alert("Failed to start AR: " + error.message);
      }
    }

    function animate(timestamp, frame) {
      if (frame) {
        const hitTestResults = frame.getHitTestResults(hitTestSource);

        if (hitTestResults.length > 0) {
          const pose = hitTestResults[0].getPose(renderer.xr.getReferenceSpace());
          if (pose) {
            reticle.visible = true;
            reticle.position.fromArray(pose.transform.position);
            reticle.quaternion.fromArray(pose.transform.orientation);
          }
        } else {
          reticle.visible = false;
        }
      }

      renderer.render(scene, camera);
    }

    // Click on screen to place hologram
    document.addEventListener('click', () => {
      if (!reticle || !reticle.visible) return;

      const hologram = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 0.4, 0.4),
        new THREE.MeshPhongMaterial({ 
          color: 0x00ffff, 
          emissive: 0x008888,
          shininess: 90 
        })
      );

      hologram.position.copy(reticle.position);
      hologram.quaternion.copy(reticle.quaternion);
      scene.add(hologram);
      placedObjects.push(hologram);

      statusEl.textContent = `Hologram placed! (${placedObjects.length})`;
    });

    // Start Button
    document.getElementById('startButton').addEventListener('click', startAR);
  </script>
</body>
</html>
