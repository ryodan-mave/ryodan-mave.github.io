  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLE + AR/MR Hologram Protocol</title>
  <link rel="stylesheet" href="https://webslides.github.io/webslides/css/webslides.css">
  <style>
    .xr-button {
      padding: 18px 40px;
      font-size: 1.6rem;
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 40px auto;
      display: block;
      font-weight: bold;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
    }
    .three-slide { width: 100%; height: 100vh; background: #000; }
  </style>
</head>
<body>
  <article id="webslides">

    <!-- Regular slides -->
    <section>
      <div class="wrap">
        <h1>BLE + AR/MR Hologram Protocol</h1>
        <p>Interactive 3D Objects in the Real World</p>
      </div>
    </section>

    <!-- AR Demo Slide -->
    <section class="bg-black">
      <div class="wrap aligncenter">
        <h2>Live AR Experience</h2>
        <p>Place holograms anchored to BLE tags in the real world</p>
        <button class="xr-button" id="enterAR">Enter AR Mode →</button>
      </div>
    </section>

  </article>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://webslides.github.io/webslides/js/webslides.js"></script>
  <script src="js/main.js"></script>
</body>
